<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft MCPE AFK Bot Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #333; }
        h2, h3 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 8px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #aaa; }
        input, button { padding: 12px; margin-top: 6px; width: 100%; box-sizing: border-box; background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 14px; }
        input:focus { border-color: #007acc; outline: none; }
        button { background-color: #007acc; cursor: pointer; font-weight: bold; transition: background 0.2s; border: none; margin-top: 15px; }
        button:hover { background-color: #005999; }
        .btn-danger { background-color: #b30000; }
        .btn-danger:hover { background-color: #800000; }
        .btn-warn { background-color: #d97706; }
        .btn-warn:hover { background-color: #b45309; }
        .action-grid { display: flex; gap: 10px; margin-top: 10px; }
        #status { font-weight: bold; color: #ff3333; background-color: rgba(255,51,51,0.1); padding: 4px 8px; border-radius: 4px; }
        .online { color: #33ff33 !important; background-color: rgba(51,255,51,0.1) !important; }
        .joining { color: #facc15 !important; background-color: rgba(250,204,21,0.1) !important; }
        #log-box, #chat-box { background-color: #0a0a0a; height: 250px; overflow-y: auto; padding: 12px; font-family: 'Courier New', Courier, monospace; border: 1px solid #333; border-radius: 4px; margin-top: 10px; font-size: 13px; }
        #chat-box { height: 200px; }
        .chat-input-container { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input-container input { margin-top: 0; flex: 1; }
        .chat-input-container button { margin-top: 0; width: 120px; }
        p { margin: 4px 0; word-break: break-all; }
        #login-gate { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>

    <div id="login-gate" class="card">
        <h3>[ AUTHENTICATION REQUIRED ]</h3>
        <label>Masukkan Kode Sandi Web:</label>
        <input type="password" id="web-password-input" placeholder="Sandi Panel Utama">
        <button id="btn-submit-pass">[ MASUK KE SYSTEM ]</button>
    </div>

    <div class="container" id="panel-content" style="display: none;">
        <h2>[ WEB PANEL ] Minecraft MCPE AFK Bot Control Center</h2>
        
        <div class="card">
            <h3>[ STATUS BOT ] ===> <span id="status">OFFLINE</span></h3>
            
            <label>Email Akun Microsoft (Pemilik Game):</label>
            <input type="email" id="username" placeholder="akun_microsoft@outlook.com">
            
            <label>Alamat IP Server Minecraft PE:</label>
            <input type="text" id="host" value="be.prownetwork.net">
            
            <label>Port Server Minecraft PE (Default Bedrock: 19132):</label>
            <input type="number" id="port" value="19132">
            
            <button id="btn-connect">[ NYALAKAN BOT ]</button>
            <button id="btn-disconnect" class="btn-danger">[ MATIKAN BOT ]</button>
            <button id="btn-logout" class="btn-warn">[ LOGOUT & HAPUS SESSION CACHE ]</button>
        </div>

        <div class="card">
            <h3>[ KONTROL MEKANIK BOT ]</h3>
            <div class="action-grid">
                <button id="btn-left-click">[ KLIK KIRI / SWING ]</button>
                <button id="btn-right-click" style="background-color: #10b981;">[ KLIK KANAN / MANCING ]</button>
            </div>
        </div>

        <div class="card">
            <h3>[ CONSOLE LOG & PROSES JOINING ]</h3>
            <div id="log-box"></div>
        </div>

        <div class="card">
            <h3>[ MONITOR CHAT & EKSEKUSI COMMAND ]</h3>
            <div id="chat-box"></div>
            <div class="chat-input-container">
                <input type="text" id="chat-msg" placeholder="Ketik pesan atau /command server...">
                <button id="btn-send">[ KIRIM ]</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const loginGate = document.getElementById('login-gate');
        const panelContent = document.getElementById('panel-content');
        const webPassInput = document.getElementById('web-password-input');
        const btnSubmitPass = document.getElementById('btn-submit-pass');

        const statusEl = document.getElementById('status');
        const logBox = document.getElementById('log-box');
        const chatBox = document.getElementById('chat-box');
        const usernameInput = document.getElementById('username');
        const hostInput = document.getElementById('host');
        const portInput = document.getElementById('port');
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const btnLogout = document.getElementById('btn-logout');
        const btnLeftClick = document.getElementById('btn-left-click');
        const btnRightClick = document.getElementById('btn-right-click');
        const chatMsg = document.getElementById('chat-msg');
        const btnSend = document.getElementById('btn-send');

        btnSubmitPass.addEventListener('click', () => {
            socket.emit('verify-password', webPassInput.value);
        });

        webPassInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSubmitPass.click();
        });

        socket.on('auth-result', (res) => {
            if (res.success) {
                loginGate.style.display = 'none';
                panelContent.style.display = 'block';
            } else {
                alert(res.msg);
            }
        });

        socket.on('status', (status) => {
            statusEl.innerText = status;
            if (status === 'ONLINE') {
                statusEl.className = 'online';
            } else if (status === 'JOINING') {
                statusEl.className = 'joining';
            } else {
                statusEl.className = '';
            }
        });

        socket.on('log', (message) => {
            const p = document.createElement('p');
            p.innerText = message;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        });

        socket.on('chat-message', (data) => {
            const p = document.createElement('p');
            p.innerHTML = `<strong>&lt;${data.username}&gt;</strong> ${data.message}`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        btnConnect.addEventListener('click', () => {
            const config = {
                username: usernameInput.value,
                host: hostInput.value,
                port: portInput.value
            };
            if (!config.username) {
                alert('Peringatan: Masukkan alamat email Microsoft akun MCPE Anda.');
                return;
            }
            socket.emit('start-bot', config);
        });

        btnDisconnect.addEventListener('click', () => {
            socket.emit('stop-bot');
        });

        btnLogout.addEventListener('click', () => {
            if (confirm('Apakah Anda ingin menghapus data login dan cache akun ini dari sistem?')) {
                socket.emit('logout-session');
            }
        });

        btnLeftClick.addEventListener('click', () => {
            socket.emit('action-left-click');
        });

        btnRightClick.addEventListener('click', () => {
            socket.emit('action-right-click');
        });

        btnSend.addEventListener('click', () => {
            const msg = chatMsg.value;
            if (msg.trim() !== "") {
                socket.emit('send-chat', msg);
                chatMsg.value = "";
            }
        });

        chatMsg.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSend.click();
        });
    </script>
</body>
</html>
